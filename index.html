<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReelApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; background:#000; color:#fff; }
    header { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333; }
    .feed { display:flex; flex-direction:column; align-items:center; }
    .card { width:100%; max-width:400px; margin:20px 0; }
    video { width:100%; border-radius:10px; }
    button { padding:5px 10px; margin-top:5px; cursor:pointer; }
    input { width:100%; padding:5px; margin-top:5px; }
  </style>
</head>
<body>

<header>
  <h2>ReelApp</h2>
  <input type="file" id="upload" accept="video/*" multiple>
</header>

<div class="feed" id="feed"></div>

<script>
let videos = JSON.parse(localStorage.getItem("videos") || "[]");

const feed = document.getElementById("feed");

function render() {
  feed.innerHTML = "";
  videos.forEach((v, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <video src="${v.url}" controls></video>
      <p>❤️ ${v.likes}</p>
      <button onclick="like(${i})">Like</button>
    `;

    feed.appendChild(div);
  });
}

function like(i) {
  videos[i].likes++;
  localStorage.setItem("videos", JSON.stringify(videos));
  render();
}

document.getElementById("upload").addEventListener("change", (e) => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    videos.unshift({
      url: URL.createObjectURL(file),
      likes: 0
    });
  });
  localStorage.setItem("videos", JSON.stringify(videos));
  render();
});

render();
</script>

</body>
</html>
